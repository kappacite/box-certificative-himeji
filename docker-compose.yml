services:

  # ─────────────────────────────────────────
  # BACKEND — Flask REST API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_planner_backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      DATABASE_PATH: /app/data/travel.db
    volumes:
      - db_data:/app/data          # SQLite file persists here
      - ./backend:/app             # Live reload in dev (remove in prod)
    ports:
      - "5000:5000"
    networks:
      - travel_net
    command: >
      bash -c "python scripts/seed_places.py &&
               flask --app app.py run --host 0.0.0.0 --port 5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────
  # FRONTEND — Vue 3 / Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./himeji-planner
      dockerfile: Dockerfile
    container_name: travel_planner_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    networks:
      - travel_net
    depends_on:
      backend:
        condition: service_healthy

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  db_data:
    name: travel_planner_db
    driver: local

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  travel_net:
    name: travel_planner_network
    driver: bridge
